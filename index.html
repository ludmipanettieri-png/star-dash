<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Dash Pro</title>
  <style>
    :root {
      --ink: #101827;
      --panel: #f9fbfd;
      --line: #243447;
      --cyan: #2ec4b6;
      --gold: #ffbf3f;
      --pink: #ef476f;
      --blue: #2d7ff9;
      --green: #4cc96f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      height: 100dvh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(46, 196, 182, 0.28), transparent 28%),
        radial-gradient(circle at 84% 24%, rgba(255, 191, 63, 0.2), transparent 30%),
        linear-gradient(135deg, #eef4f8 0%, #dfe9ef 55%, #f7f0dc 100%);
    }

    .shell {
      width: min(96vw, 980px);
      height: min(650px, calc(100dvh - 36px));
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .side,
    .stage {
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(249, 251, 253, 0.92);
      box-shadow: 0 8px 0 var(--line);
    }

    .side {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
    }

    .brand span {
      font-weight: 800;
      color: #536172;
      letter-spacing: 0;
      text-transform: uppercase;
      font-size: 11px;
    }

    .meter-grid {
      display: grid;
      gap: 8px;
    }

    .meter {
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 9px;
    }

    .meter small {
      display: block;
      color: #536172;
      font-weight: 800;
      font-size: 11px;
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    .meter strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .buttons {
      display: grid;
      gap: 8px;
      margin-top: auto;
    }

    button {
      height: 42px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--gold);
      color: var(--ink);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--line);
    }

    button.secondary {
      background: #ffffff;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--line);
    }

    .hint {
      margin: 0;
      color: #536172;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
    }

    .stage {
      position: relative;
      overflow: hidden;
      min-height: 0;
      background: #182230;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #162231;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(240, 245, 249, 0.9);
      backdrop-filter: blur(4px);
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      width: min(92%, 520px);
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: clamp(36px, 8vw, 72px);
      line-height: 0.95;
    }

    .overlay p {
      margin: 0 0 18px;
      color: #3e4b5b;
      font-size: 17px;
      font-weight: 800;
      line-height: 1.35;
    }

    .touch {
      display: none;
      grid-template-columns: repeat(3, 54px);
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }

    .touch button {
      width: 54px;
      padding: 0;
      font-size: 18px;
      touch-action: none;
    }

    .touch .ghost {
      visibility: hidden;
    }

    @media (max-width: 780px) {
      body {
        padding: 10px;
      }

      .shell {
        height: calc(100dvh - 20px);
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 10px;
      }

      .side {
        padding: 10px;
        box-shadow: 0 5px 0 var(--line);
      }

      .brand {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .brand span {
        text-align: right;
      }

      .meter-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .meter {
        padding: 6px;
      }

      .meter strong {
        font-size: 17px;
      }

      .buttons {
        grid-template-columns: 1fr 1fr;
        margin-top: 0;
      }

      .hint {
        display: none;
      }

      .touch {
        display: grid;
        margin-top: 0;
      }
    }

    @media (max-width: 480px) {
      .meter-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <aside class="side">
      <div class="brand">
        <h1>Star Dash</h1>
        <span>Pro mode</span>
      </div>

      <section class="meter-grid" aria-label="Marcador">
        <div class="meter">
          <small>Puntos</small>
          <strong id="score">0</strong>
        </div>
        <div class="meter">
          <small>Record</small>
          <strong id="best">0</strong>
        </div>
        <div class="meter">
          <small>Vidas</small>
          <strong id="lives">3</strong>
        </div>
        <div class="meter">
          <small>Nivel</small>
          <strong id="level">1</strong>
        </div>
      </section>

      <p class="hint">Flechas o WASD para moverte. Espacio pausa. Recoge estrellas, el diamante verde te da escudo.</p>

      <div class="buttons">
        <button id="startButton">Jugar</button>
        <button class="secondary" id="pauseButton">Pausa</button>
      </div>
    </aside>

    <section class="stage">
      <canvas id="gameCanvas" width="960" height="600"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-box">
          <h2 id="overlayTitle">Star Dash</h2>
          <p id="overlayText">Un mini arcade: recoge estrellas, esquiva drones y encadena puntos para subir de nivel.</p>
          <button id="overlayButton">Empezar partida</button>
        </div>
      </div>
    </section>

    <section class="touch" aria-label="Controles tactiles">
      <span class="ghost"></span>
      <button data-dir="up" aria-label="Arriba">^</button>
      <span class="ghost"></span>
      <button data-dir="left" aria-label="Izquierda">&lt;</button>
      <button data-dir="down" aria-label="Abajo">v</button>
      <button data-dir="right" aria-label="Derecha">&gt;</button>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const bestEl = document.querySelector("#best");
    const livesEl = document.querySelector("#lives");
    const levelEl = document.querySelector("#level");
    const startButton = document.querySelector("#startButton");
    const pauseButton = document.querySelector("#pauseButton");
    const overlay = document.querySelector("#overlay");
    const overlayTitle = document.querySelector("#overlayTitle");
    const overlayText = document.querySelector("#overlayText");
    const overlayButton = document.querySelector("#overlayButton");

    const state = {
      playing: false,
      paused: false,
      score: 0,
      best: Number(localStorage.getItem("starDashBest") || 0),
      lives: 3,
      level: 1,
      combo: 1,
      time: 0,
      lastHit: -9999,
      shake: 0,
      shieldUntil: 0
    };

    const keys = new Set();
    const player = { x: 90, y: 300, size: 30, speed: 4.9, trail: [] };
    const star = { x: 560, y: 280, size: 18, pulse: 0 };
    const shield = { x: 0, y: 0, size: 20, active: false, spawnAt: 0 };
    let enemies = [];
    let particles = [];

    bestEl.textContent = state.best;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      const ax = a.x + a.size / 2;
      const ay = a.y + a.size / 2;
      const bx = b.x + b.size / 2;
      const by = b.y + b.size / 2;
      return Math.hypot(ax - bx, ay - by);
    }

    function collide(a, b, bonus = 0) {
      return distance(a, b) < (a.size + b.size) / 2 + bonus;
    }

    function updateHud() {
      scoreEl.textContent = state.score;
      bestEl.textContent = state.best;
      livesEl.textContent = state.lives;
      levelEl.textContent = state.level;
    }

    function setOverlay(title, text, buttonText) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlayButton.textContent = buttonText;
      overlay.classList.remove("hidden");
    }

    function hideOverlay() {
      overlay.classList.add("hidden");
    }

    function resetPlayer() {
      player.x = 72;
      player.y = canvas.height / 2 - player.size / 2;
      player.trail = [];
    }

    function safePosition(size) {
      return {
        x: rand(70, canvas.width - size - 70),
        y: rand(60, canvas.height - size - 60)
      };
    }

    function moveStar() {
      let pos = safePosition(star.size);
      while (Math.hypot(pos.x - player.x, pos.y - player.y) < 130) {
        pos = safePosition(star.size);
      }
      star.x = pos.x;
      star.y = pos.y;
    }

    function spawnShield(force = false) {
      if (!force && (shield.active || state.time < shield.spawnAt)) return;
      const pos = safePosition(shield.size);
      shield.x = pos.x;
      shield.y = pos.y;
      shield.active = true;
      shield.spawnAt = state.time + rand(10, 16);
    }

    function makeEnemies() {
      enemies = [];
      const count = Math.min(4 + state.level, 11);
      const speedBoost = state.level * 0.28;

      for (let i = 0; i < count; i++) {
        const size = rand(24, 40);
        const pos = safePosition(size);
        enemies.push({
          x: pos.x + 120,
          y: pos.y,
          size,
          angle: rand(0, Math.PI * 2),
          spin: rand(-0.05, 0.05),
          vx: rand(1.5, 3.1 + speedBoost) * (Math.random() > 0.5 ? 1 : -1),
          vy: rand(1.2, 2.6 + speedBoost) * (Math.random() > 0.5 ? 1 : -1)
        });
      }
    }

    function burst(x, y, color, amount = 18) {
      for (let i = 0; i < amount; i++) {
        particles.push({
          x,
          y,
          vx: rand(-3.4, 3.4),
          vy: rand(-3.4, 3.4),
          life: rand(22, 44),
          maxLife: 44,
          size: rand(2, 5),
          color
        });
      }
    }

    function startGame() {
      state.playing = true;
      state.paused = false;
      state.score = 0;
      state.lives = 3;
      state.level = 1;
      state.combo = 1;
      state.time = 0;
      state.lastHit = -9999;
      state.shake = 0;
      state.shieldUntil = 0;
      player.speed = 4.9;
      particles = [];
      shield.active = false;
      shield.spawnAt = 8;
      resetPlayer();
      moveStar();
      makeEnemies();
      hideOverlay();
      startButton.textContent = "Reiniciar";
      pauseButton.textContent = "Pausa";
      updateHud();
    }

    function gameOver() {
      state.playing = false;
      state.paused = false;
      state.best = Math.max(state.best, state.score);
      localStorage.setItem("starDashBest", String(state.best));
      updateHud();
      setOverlay("Fin", `Puntuacion final: ${state.score}. Record: ${state.best}.`, "Otra partida");
    }

    function togglePause() {
      if (!state.playing) return;
      state.paused = !state.paused;
      pauseButton.textContent = state.paused ? "Seguir" : "Pausa";
      if (state.paused) {
        setOverlay("Pausa", "Respira. Pulsa Seguir o espacio para continuar.", "Seguir");
      } else {
        hideOverlay();
      }
    }

    function updateGame() {
      if (!state.playing || state.paused) return;

      state.time += 1 / 60;
      state.shake *= 0.9;
      star.pulse += 0.08;

      let dx = 0;
      let dy = 0;
      if (keys.has("arrowup") || keys.has("w")) dy -= 1;
      if (keys.has("arrowdown") || keys.has("s")) dy += 1;
      if (keys.has("arrowleft") || keys.has("a")) dx -= 1;
      if (keys.has("arrowright") || keys.has("d")) dx += 1;

      if (dx || dy) {
        const length = Math.hypot(dx, dy);
        player.x += (dx / length) * player.speed;
        player.y += (dy / length) * player.speed;
      }

      player.x = clamp(player.x, 0, canvas.width - player.size);
      player.y = clamp(player.y, 0, canvas.height - player.size);
      player.trail.unshift({ x: player.x, y: player.y });
      player.trail = player.trail.slice(0, 12);

      for (const enemy of enemies) {
        enemy.x += enemy.vx;
        enemy.y += enemy.vy;
        enemy.angle += enemy.spin;

        if (enemy.x < 8 || enemy.x + enemy.size > canvas.width - 8) enemy.vx *= -1;
        if (enemy.y < 8 || enemy.y + enemy.size > canvas.height - 8) enemy.vy *= -1;

        if (collide(player, enemy) && state.time - state.lastHit > 1.1) {
          state.lastHit = state.time;
          if (state.shieldUntil > state.time) {
            state.shieldUntil = 0;
            burst(player.x + 15, player.y + 15, "#4cc96f", 34);
          } else {
            state.lives--;
            state.combo = 1;
            state.shake = 12;
            burst(player.x + 15, player.y + 15, "#ef476f", 30);
            resetPlayer();
            if (state.lives <= 0) gameOver();
          }
          updateHud();
        }
      }

      if (collide(player, star, 6)) {
        const gained = 10 * state.combo;
        state.score += gained;
        state.combo = Math.min(state.combo + 1, 5);
        burst(star.x + star.size / 2, star.y + star.size / 2, "#ffbf3f", 22);

        if (state.score >= state.level * 70) {
          state.level++;
          player.speed += 0.22;
          makeEnemies();
          burst(canvas.width / 2, 48, "#2ec4b6", 34);
        }

        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem("starDashBest", String(state.best));
        }

        moveStar();
        updateHud();
      }

      spawnShield();
      if (shield.active && collide(player, shield, 8)) {
        shield.active = false;
        state.shieldUntil = state.time + 6;
        burst(shield.x + 10, shield.y + 10, "#4cc96f", 24);
      }

      particles = particles.filter((particle) => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vx *= 0.96;
        particle.vy *= 0.96;
        particle.life--;
        return particle.life > 0;
      });
    }

    function drawArena() {
      const grid = 48;
      ctx.fillStyle = "#162231";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(46,196,182,0.35)";
      ctx.lineWidth = 4;
      ctx.strokeRect(12, 12, canvas.width - 24, canvas.height - 24);
    }

    function drawStar() {
      const cx = star.x + star.size / 2;
      const cy = star.y + star.size / 2;
      const pulse = Math.sin(star.pulse) * 3;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(star.pulse * 0.35);
      ctx.shadowColor = "#ffbf3f";
      ctx.shadowBlur = 20;
      ctx.fillStyle = "#ffbf3f";
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const radius = i % 2 === 0 ? star.size + pulse : star.size / 2;
        const angle = (Math.PI / 5) * i - Math.PI / 2;
        ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawShield() {
      if (!shield.active) return;
      const cx = shield.x + shield.size / 2;
      const cy = shield.y + shield.size / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(state.time * 1.8);
      ctx.shadowColor = "#4cc96f";
      ctx.shadowBlur = 18;
      ctx.fillStyle = "#4cc96f";
      ctx.beginPath();
      ctx.moveTo(0, -18);
      ctx.lineTo(18, 0);
      ctx.lineTo(0, 18);
      ctx.lineTo(-18, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawEnemy(enemy) {
      ctx.save();
      ctx.translate(enemy.x + enemy.size / 2, enemy.y + enemy.size / 2);
      ctx.rotate(enemy.angle);
      ctx.shadowColor = "#ef476f";
      ctx.shadowBlur = 12;
      ctx.fillStyle = "#ef476f";
      ctx.fillRect(-enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
      ctx.strokeStyle = "#ffe3ea";
      ctx.lineWidth = 3;
      ctx.strokeRect(-enemy.size / 2 + 5, -enemy.size / 2 + 5, enemy.size - 10, enemy.size - 10);
      ctx.restore();
    }

    function drawPlayer() {
      for (let i = player.trail.length - 1; i >= 0; i--) {
        const t = player.trail[i];
        const alpha = 1 - i / player.trail.length;
        ctx.fillStyle = `rgba(45, 127, 249, ${alpha * 0.18})`;
        ctx.beginPath();
        ctx.arc(t.x + player.size / 2, t.y + player.size / 2, player.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }

      const cx = player.x + player.size / 2;
      const cy = player.y + player.size / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.shadowColor = "#2d7ff9";
      ctx.shadowBlur = 18;
      ctx.fillStyle = "#2d7ff9";
      ctx.beginPath();
      ctx.arc(0, 0, player.size / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(-6, -5, 3.2, 0, Math.PI * 2);
      ctx.arc(7, -5, 3.2, 0, Math.PI * 2);
      ctx.fill();

      if (state.shieldUntil > state.time) {
        ctx.strokeStyle = "#4cc96f";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, player.size * 0.9, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawGameText() {
      if (!state.playing || state.paused) return;
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.font = "800 16px Segoe UI, Arial";
      ctx.fillText(`Combo x${state.combo}`, 24, 36);
      if (state.shieldUntil > state.time) {
        ctx.fillStyle = "#4cc96f";
        ctx.fillText(`Escudo ${Math.ceil(state.shieldUntil - state.time)}s`, 24, 60);
      }
    }

    function draw() {
      const shakeX = state.shake ? rand(-state.shake, state.shake) : 0;
      const shakeY = state.shake ? rand(-state.shake, state.shake) : 0;

      ctx.save();
      ctx.translate(shakeX, shakeY);
      drawArena();
      drawShield();
      drawStar();
      for (const enemy of enemies) drawEnemy(enemy);
      drawParticles();
      drawPlayer();
      drawGameText();
      ctx.restore();
    }

    function loop() {
      updateGame();
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      const gameKeys = [" ", "enter", "arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"];
      if (gameKeys.includes(key)) {
        event.preventDefault();
      }
      if (key === "enter") {
        startGame();
        return;
      }
      if (key === " ") {
        togglePause();
        return;
      }
      keys.add(key);
    });

    document.addEventListener("keyup", (event) => {
      keys.delete(event.key.toLowerCase());
    });

    const touchMap = { up: "arrowup", down: "arrowdown", left: "arrowleft", right: "arrowright" };
    document.querySelectorAll("[data-dir]").forEach((button) => {
      const key = touchMap[button.dataset.dir];
      button.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        keys.add(key);
      });
      button.addEventListener("pointerup", () => keys.delete(key));
      button.addEventListener("pointercancel", () => keys.delete(key));
      button.addEventListener("pointerleave", () => keys.delete(key));
    });

    startButton.addEventListener("click", startGame);
    pauseButton.addEventListener("click", togglePause);
    overlayButton.addEventListener("click", () => {
      if (state.playing && state.paused) {
        togglePause();
      } else {
        startGame();
      }
    });

    makeEnemies();
    moveStar();
    updateHud();
    loop();
  </script>
</body>
</html>
